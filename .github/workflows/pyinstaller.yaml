name: pyinstaller

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - uses: engineerd/configurator@v0.0.10
      with:
        name: "upx.exe"
        url: "https://github.com/upx/upx/releases/download/v4.2.2/upx-4.2.2-win64.zip"
        pathInArchive: "upx-4.2.2-win64/upx.exe"

    - run: pip install -r requirements.txt
    - run: pip install pyinstaller garth==0.6.3
    - run: pyinstaller standalone.spec

    - uses: vimtor/action-zip@v1.2
      with:
        files: dist
        dest: zoffline-latest.zip

    - uses: WebFreak001/deploy-nightly@v3.2.0
      with:
        upload_url: https://uploads.github.com/repos/fatsbrown/zwift-offline/releases/269180862/assets{?name,label}
        release_id: 269180862
        asset_path: zoffline-latest.zip
        asset_name: zoffline-latest.zip
        asset_content_type: application/zip
